name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # バックエンドのテスト
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: type_rush_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Check if Laravel is set up
        id: check-laravel
        run: |
          if [ -f "composer.json" ]; then
            echo "laravel_exists=true" >> $GITHUB_OUTPUT
          else
            echo "laravel_exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ Laravel is not set up yet. Skipping backend tests."
          fi

      - name: Setup PHP
        if: steps.check-laravel.outputs.laravel_exists == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo_mysql, bcmath
          coverage: xdebug

      - name: Get Composer Cache Directory
        if: steps.check-laravel.outputs.laravel_exists == 'true'
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        if: steps.check-laravel.outputs.laravel_exists == 'true'
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        if: steps.check-laravel.outputs.laravel_exists == 'true'
        run: composer install --prefer-dist --no-progress

      - name: Copy .env
        if: steps.check-laravel.outputs.laravel_exists == 'true'
        run: cp .env.example .env

      - name: Generate key
        if: steps.check-laravel.outputs.laravel_exists == 'true'
        run: php artisan key:generate

      - name: Run tests
        if: steps.check-laravel.outputs.laravel_exists == 'true'
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: type_rush_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan test
